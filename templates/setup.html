{% extends "base.html" %}
{% block title %}{{ _('setup.title') }} - {{ _('nav.brand') }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>{{ _('setup.title') }}</h1>
        <p>{{ _('setup.description') }}</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ _('setup.form.username') }}</label>
                <input type="text" id="username" name="username"
                       placeholder="{{ _('setup.form.username_placeholder') }}"
                       minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]{3,30}"
                       required autofocus>
            </div>

            <div class="form-group">
                <label for="password">{{ _('setup.form.password') }}</label>
                <input type="password" id="password" name="password"
                       placeholder="{{ _('setup.form.password_placeholder') }}"
                       minlength="8" maxlength="128" required>
            </div>

            <div class="form-group">
                <label for="password_confirm">{{ _('setup.form.password_confirm') }}</label>
                <input type="password" id="password_confirm" name="password_confirm"
                       placeholder="{{ _('setup.form.password_confirm_placeholder') }}"
                       minlength="8" maxlength="128" required>
            </div>

            <button type="submit" class="btn">{{ _('setup.form.submit') }}</button>
        </form>
    </div>
</div>
{% endblock %}
