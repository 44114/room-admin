{% extends "base.html" %}
{% block title %}{{ _('login.title') }} - {{ _('nav.brand') }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>{{ _('login.title') }}</h1>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ _('login.form.username') }}</label>
                <input type="text" id="username" name="username"
                       placeholder="{{ _('login.form.username_placeholder') }}" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">{{ _('login.form.password') }}</label>
                <input type="password" id="password" name="password"
                       placeholder="{{ _('login.form.password_placeholder') }}" required>
            </div>

            <button type="submit" class="btn">{{ _('login.form.submit') }}</button>
        </form>
    </div>
</div>
{% endblock %}
